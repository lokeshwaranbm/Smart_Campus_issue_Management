<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Force Delete Issues - Smart Campus</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #1f2937;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .current-data {
      background: #fef2f2;
      border: 2px solid #fca5a5;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .data-title {
      color: #dc2626;
      font-weight: 600;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .issue-item {
      background: white;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
    }

    .issue-title {
      color: #1f2937;
      font-weight: 600;
    }

    .issue-status {
      color: #6b7280;
      font-size: 12px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin: 10px 0;
    }

    .btn-delete-now {
      background: #dc2626;
      color: white;
    }

    .btn-delete-now:hover {
      background: #b91c1c;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(220, 38, 38, 0.4);
    }

    .btn-refresh {
      background: #3b82f6;
      color: white;
    }

    .btn-refresh:hover {
      background: #2563eb;
    }

    .success {
      background: #d1fae5;
      border: 2px solid #6ee7b7;
      color: #065f46;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: center;
      font-weight: 600;
    }

    .hidden {
      display: none;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗑️ Force Delete All Issues</h1>
    <p class="subtitle">This will immediately clear all issues from localStorage</p>

    <div class="current-data">
      <div class="data-title">📋 Current Issues in Database:</div>
      <div id="issuesList"></div>
    </div>

    <button class="btn btn-delete-now" onclick="forceDelete()">
      🗑️ DELETE ALL ISSUES NOW
    </button>

    <button class="btn btn-refresh" onclick="location.reload()">
      🔄 Refresh to Check
    </button>

    <div id="successMessage" class="success hidden">
      ✅ Successfully deleted all issues!<br>
      <small>Now refresh your admin panel (F5)</small>
    </div>
  </div>

  <script>
    const ISSUES_KEY = 'smart-campus-issues';

    function displayCurrentIssues() {
      const issues = JSON.parse(localStorage.getItem(ISSUES_KEY) || '[]');
      const container = document.getElementById('issuesList');
      
      if (issues.length === 0) {
        container.innerHTML = '<div class="empty">✅ No issues found - database is clean!</div>';
        return;
      }

      container.innerHTML = issues.map(issue => `
        <div class="issue-item">
          <div>
            <div class="issue-title">${issue.title}</div>
            <div class="issue-status">${issue.category || 'unknown'} • ${issue.status || 'unknown'}</div>
          </div>
          <div class="issue-status">${issue.studentName || 'Unknown'}</div>
        </div>
      `).join('');
    }

    function forceDelete() {
      const issues = JSON.parse(localStorage.getItem(ISSUES_KEY) || '[]');
      
      if (issues.length === 0) {
        alert('✅ Database is already empty! No issues to delete.');
        return;
      }

      const confirmed = confirm(
        `⚠️ FORCE DELETE ${issues.length} ISSUE(S)?\n\n` +
        `This will IMMEDIATELY delete:\n` +
        issues.slice(0, 5).map(i => `• ${i.title}`).join('\n') +
        (issues.length > 5 ? `\n...and ${issues.length - 5} more` : '') +
        `\n\nThis CANNOT be undone!\n\nClick OK to DELETE NOW.`
      );

      if (!confirmed) return;

      try {
        // Force delete
        localStorage.setItem(ISSUES_KEY, JSON.stringify([]));
        localStorage.removeItem(ISSUES_KEY);
        localStorage.setItem(ISSUES_KEY, '[]');
        
        // Show success
        document.getElementById('successMessage').classList.remove('hidden');
        displayCurrentIssues();
        
        console.log('✅ FORCE DELETED all issues!');
        
        // Auto-reload after 2 seconds
        setTimeout(() => {
          location.reload();
        }, 2000);
      } catch (error) {
        console.error('Error:', error);
        alert('Error deleting issues: ' + error.message);
      }
    }

    // Load on page load
    window.addEventListener('DOMContentLoaded', displayCurrentIssues);
  </script>
</body>
</html>
