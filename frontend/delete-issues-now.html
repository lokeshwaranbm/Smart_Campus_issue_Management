<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Issues - Smart Campus</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 50px 40px;
      text-align: center;
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }

    h1 {
      color: #1f2937;
      margin-bottom: 15px;
      font-size: 32px;
    }

    .stats {
      background: #f3f4f6;
      border-radius: 12px;
      padding: 20px;
      margin: 30px 0;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 15px;
    }

    .stat-label {
      color: #6b7280;
    }

    .stat-value {
      font-weight: 700;
      color: #1f2937;
    }

    .btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin: 10px 0;
    }

    .btn-delete {
      background: #dc2626;
      color: white;
    }

    .btn-delete:hover {
      background: #b91c1c;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(220, 38, 38, 0.4);
    }

    .btn-cancel {
      background: #f3f4f6;
      color: #6b7280;
    }

    .btn-cancel:hover {
      background: #e5e7eb;
    }

    .success {
      background: #d1fae5;
      color: #065f46;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      font-weight: 600;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="confirmView">
      <div class="icon">🗑️</div>
      <h1>Delete All Issues?</h1>
      <p style="color: #6b7280; margin-bottom: 20px;">
        This will permanently delete all reports from the database
      </p>

      <div class="stats" id="statsBox">
        <div class="stat-row">
          <span class="stat-label">Total Issues:</span>
          <span class="stat-value" id="totalCount">-</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Assigned:</span>
          <span class="stat-value" id="assignedCount">-</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">In Progress:</span>
          <span class="stat-value" id="progressCount">-</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Resolved:</span>
          <span class="stat-value" id="resolvedCount">-</span>
        </div>
      </div>

      <button class="btn btn-delete" onclick="deleteAll()">
        🗑️ Delete All Issues
      </button>
      <button class="btn btn-cancel" onclick="window.close()">
        Cancel
      </button>
    </div>

    <div id="successView" class="hidden">
      <div class="icon">✅</div>
      <h1>All Issues Deleted!</h1>
      <div class="success">
        Successfully deleted all issues from the database.<br>
        You can now import fresh data.
      </div>
      <button class="btn btn-cancel" onclick="window.close()" style="margin-top: 30px;">
        Close Window
      </button>
    </div>
  </div>

  <script>
    const ISSUES_KEY = 'smart-campus-issues';

    function loadStats() {
      const issues = JSON.parse(localStorage.getItem(ISSUES_KEY) || '[]');
      
      document.getElementById('totalCount').textContent = issues.length;
      document.getElementById('assignedCount').textContent = 
        issues.filter(i => i.status === 'assigned' || i.status === 'submitted').length;
      document.getElementById('progressCount').textContent = 
        issues.filter(i => i.status === 'in_progress').length;
      document.getElementById('resolvedCount').textContent = 
        issues.filter(i => i.status === 'resolved').length;
    }

    function deleteAll() {
      const issues = JSON.parse(localStorage.getItem(ISSUES_KEY) || '[]');
      
      if (issues.length === 0) {
        alert('No issues to delete!');
        return;
      }

      const confirmed = confirm(
        `⚠️ WARNING: You are about to DELETE ${issues.length} issue(s).\n\n` +
        `This action CANNOT be undone!\n\n` +
        `Click OK to proceed.`
      );

      if (!confirmed) return;

      try {
        // Delete all issues
        localStorage.setItem(ISSUES_KEY, JSON.stringify([]));
        
        // Show success view
        document.getElementById('confirmView').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');
        
        console.log('✅ Successfully deleted all issues!');
      } catch (error) {
        console.error('Error deleting issues:', error);
        alert('Error: Failed to delete issues. Check console for details.');
      }
    }

    // Load stats on page load
    window.addEventListener('DOMContentLoaded', loadStats);
  </script>
</body>
</html>
